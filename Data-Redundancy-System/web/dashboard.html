<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard – Data Redundancy System</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <style>
    body { background:#f0f2f5; }
    .sidebar { width:240px; min-height:100vh; background:linear-gradient(180deg,#0f3460,#533483); position:fixed; }
    .sidebar a { color:rgba(255,255,255,.8); text-decoration:none; display:block; padding:12px 20px; transition:.2s; }
    .sidebar a:hover, .sidebar a.active { background:rgba(255,255,255,.15); color:#fff; }
    .main { margin-left:240px; padding:24px; }
    .stat-card { border:none; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,.08); }
    .stat-unique    { background:linear-gradient(135deg,#11998e,#38ef7d); }
    .stat-duplicate { background:linear-gradient(135deg,#f7971e,#ffd200); }
    .stat-potential { background:linear-gradient(135deg,#6a82fb,#fc5c7d); }
    .stat-total     { background:linear-gradient(135deg,#0f3460,#533483); }
    .badge-UNIQUE            { background:#28a745; }
    .badge-DUPLICATE         { background:#dc3545; }
    .badge-POTENTIAL_DUPLICATE{ background:#ffc107; color:#000!important; }
    .badge-FALSE_POSITIVE    { background:#6c757d; }
  </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar d-flex flex-column pt-3">
  <div class="text-center text-white py-3 mb-2">
    <h5 class="mb-0">🛡️ DRS Admin</h5>
    <small id="userLabel" class="opacity-75"></small>
  </div>
  <a href="dashboard.html" class="active">📊 Dashboard</a>
  <a href="add-record.html">➕ Add Record</a>
  <a href="records.html">📋 All Records</a>
  <a href="reports.html">📄 Reports</a>
  <a href="#" onclick="logout()">🚪 Logout</a>
</div>

<!-- Main -->
<div class="main">
  <h4 class="mb-4 fw-bold">Dashboard Overview</h4>

  <!-- Stat Cards -->
  <div class="row g-3 mb-4">
    <div class="col-md-3">
      <div class="card stat-card stat-total text-white p-3">
        <div class="small opacity-75">Total Records</div>
        <div class="fs-2 fw-bold" id="cTotal">—</div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card stat-card stat-unique text-white p-3">
        <div class="small opacity-75">Unique</div>
        <div class="fs-2 fw-bold" id="cUnique">—</div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card stat-card stat-duplicate text-white p-3">
        <div class="small opacity-75">Duplicates</div>
        <div class="fs-2 fw-bold" id="cDup">—</div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card stat-card stat-potential text-white p-3">
        <div class="small opacity-75">Potential Dupl.</div>
        <div class="fs-2 fw-bold" id="cPot">—</div>
      </div>
    </div>
  </div>

  <!-- Redundancy Bar -->
  <div class="card mb-4 border-0 shadow-sm">
    <div class="card-body">
      <h6 class="fw-semibold">Redundancy Percentage</h6>
      <div class="progress" style="height:22px;">
        <div id="redBar" class="progress-bar bg-danger progress-bar-striped" style="width:0%">0%</div>
      </div>
    </div>
  </div>

  <!-- Recent Records Table -->
  <div class="card border-0 shadow-sm">
    <div class="card-header bg-white fw-semibold">Recent Records</div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr><th>Record ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Dept</th><th>Status</th><th>Date</th></tr>
          </thead>
          <tbody id="recordsBody"><tr><td colspan="7" class="text-center py-3">Loading…</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
  if (!sessionStorage.getItem('loggedIn')) window.location.href='login.html';
  document.getElementById('userLabel').textContent = sessionStorage.getItem('username') || '';

  function logout() { sessionStorage.clear(); window.location.href='login.html'; }

  function loadDashboard() {
    fetch('/api/dashboard')
      .then(r => r.json())
      .then(d => {
        document.getElementById('cTotal').textContent  = d.total;
        document.getElementById('cUnique').textContent = d.unique;
        document.getElementById('cDup').textContent    = d.duplicate;
        document.getElementById('cPot').textContent    = d.potential;
        const pct = d.total > 0
          ? (((d.duplicate + d.potential) / d.total) * 100).toFixed(1)
          : '0.0';
        const bar = document.getElementById('redBar');
        bar.style.width = pct + '%';
        bar.textContent  = pct + '%';
      });

    fetch('/api/records')
      .then(r => r.json())
      .then(records => {
        const tbody = document.getElementById('recordsBody');
        if (!records.length) {
          tbody.innerHTML = '<tr><td colspan="7" class="text-center py-3">No records yet.</td></tr>';
          return;
        }
        tbody.innerHTML = records.slice(0,20).map(r => `
          <tr>
            <td>${r.recordId}</td>
            <td>${r.name}</td>
            <td>${r.email}</td>
            <td>${r.phone}</td>
            <td>${r.department || '—'}</td>
            <td><span class="badge badge-${r.status}">${r.status}</span></td>
            <td>${r.dateCreated ? r.dateCreated.substring(0,10) : ''}</td>
          </tr>`).join('');
      });
  }

  loadDashboard();
</script>
</body>
</html>
