<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Reports – DRS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <style>
    body{background:#f0f2f5}
    .sidebar{width:240px;min-height:100vh;background:linear-gradient(180deg,#0f3460,#533483);position:fixed}
    .sidebar a{color:rgba(255,255,255,.8);text-decoration:none;display:block;padding:12px 20px;transition:.2s}
    .sidebar a:hover,.sidebar a.active{background:rgba(255,255,255,.15);color:#fff}
    .main{margin-left:240px;padding:24px}
    pre{background:#1e1e2e;color:#cdd6f4;padding:20px;border-radius:8px;font-size:13px;white-space:pre-wrap;max-height:500px;overflow-y:auto}
  </style>
</head>
<body>
<div class="sidebar d-flex flex-column pt-3">
  <div class="text-center text-white py-3 mb-2"><h5 class="mb-0">🛡️ DRS Admin</h5></div>
  <a href="dashboard.html">📊 Dashboard</a>
  <a href="add-record.html">➕ Add Record</a>
  <a href="records.html">📋 All Records</a>
  <a href="reports.html" class="active">📄 Reports</a>
  <a href="#" onclick="sessionStorage.clear();window.location.href='login.html'">🚪 Logout</a>
</div>
<div class="main">
  <h4 class="fw-bold mb-4">Reports</h4>
  <div class="d-flex gap-2 mb-3 flex-wrap">
    <button class="btn btn-primary"   onclick="loadReport('summary')">📊 Summary Report</button>
    <button class="btn btn-danger"    onclick="loadReport('duplicate')">🔴 Duplicate Report</button>
    <button class="btn btn-warning"   onclick="loadReport('validation')">⚠️ Validation Report</button>
    <button class="btn btn-outline-secondary" onclick="copyReport()">📋 Copy</button>
  </div>
  <pre id="reportOutput">Select a report above to view it here.</pre>
</div>
<script>
  if(!sessionStorage.getItem('loggedIn'))window.location.href='login.html';
  function loadReport(type){
    document.getElementById('reportOutput').textContent='Loading…';
    fetch('/api/reports/'+type)
      .then(r=>r.text())
      .then(t=>{document.getElementById('reportOutput').textContent=t;});
  }
  function copyReport(){
    navigator.clipboard.writeText(document.getElementById('reportOutput').textContent)
      .then(()=>alert('Copied to clipboard!'));
  }
</script>
</body>
</html>
