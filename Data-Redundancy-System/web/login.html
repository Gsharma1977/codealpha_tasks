<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login – Data Redundancy System</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <style>
    body { background: linear-gradient(135deg,#1a1a2e,#16213e); min-height:100vh; display:flex; align-items:center; }
    .card { border:none; border-radius:16px; box-shadow:0 20px 60px rgba(0,0,0,.5); }
    .card-header { background:linear-gradient(135deg,#0f3460,#533483); border-radius:16px 16px 0 0!important; }
    .btn-login { background:linear-gradient(135deg,#0f3460,#533483); border:none; }
    .btn-login:hover { opacity:.9; }
    #errorMsg { display:none; }
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card">
        <div class="card-header text-white text-center py-4">
          <h3 class="mb-0">🛡️ Data Redundancy System</h3>
          <small class="opacity-75">Admin Login Portal</small>
        </div>
        <div class="card-body p-4">
          <div id="errorMsg" class="alert alert-danger" role="alert"></div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <input id="username" type="text" class="form-control" placeholder="Enter username" />
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <input id="password" type="password" class="form-control" placeholder="Enter password" />
          </div>
          <div class="d-grid">
            <button class="btn btn-login btn-lg text-white" onclick="doLogin()">Login →</button>
          </div>
          <p class="text-muted text-center mt-3 small">Default: admin / admin123</p>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
  function doLogin() {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value.trim();
    if (!u || !p) { showError('Please enter username and password.'); return; }

    fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username: u, password: p})
    })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        sessionStorage.setItem('loggedIn','true');
        sessionStorage.setItem('username', u);
        window.location.href = 'dashboard.html';
      } else {
        showError('Invalid username or password.');
      }
    })
    .catch(() => showError('Server error. Make sure the Java server is running.'));
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
